name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          # Fail loudly if the node-pty backend can't load, instead of letting every
          # it.skipIf(!PTY_READY) case (the ONLY real-terminal guards for the
          # \x1b[3J-never-emitted / autoscroll / subagent-panel contracts) skip green on a
          # broken native build. node-pty is a devDependency installed by `npm ci` above.
          JUNO_REQUIRE_PTY: '1'
